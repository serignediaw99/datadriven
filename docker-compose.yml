services:
  backend:
    image: python:3.11-slim
    working_dir: /app
    command: >
      sh -c "pip install uv -q && uv sync && uv run uvicorn app.main:app --host 0.0.0.0 --port 8000"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - PYTHONDONTWRITEBYTECODE=1

  frontend:
    image: node:23-slim
    working_dir: /app
    command: sh -c "npm install && npm run build && npm start"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
